<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>기사 게시판 | COALAB AI뉴스</title>
  <meta name="description" content="AI 뉴스 기사 게시판 - 최신 AI 뉴스와 기사를 확인하세요">
  <link rel="stylesheet" href="css/board.css">
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a href="index.html" class="site-logo">COALAB <span>AI뉴스</span></a>
    <nav class="site-nav">
      <a href="index.html">홈</a>
      <a href="board.html" class="active">기사 게시판</a>
      <a href="archive-list.html">아카이브</a>
      <a href="admin.html">관리자</a>
    </nav>
  </div>
</header>

<div class="content-wrap">
  <!-- 검색/필터 -->
  <div class="toolbar">
    <input type="text" id="search-input" placeholder="기사 검색...">
    <select id="category-filter">
      <option value="">전체 카테고리</option>
      <option value="AI">AI</option>
      <option value="산업">산업</option>
      <option value="기술">기술</option>
      <option value="정책">정책</option>
      <option value="일반">일반</option>
    </select>
    <button class="btn btn-primary" onclick="currentPage=1;loadArticles()">검색</button>
  </div>

  <!-- 기사 목록 -->
  <div id="article-list">
    <div class="loading">기사를 불러오는 중</div>
  </div>

  <!-- 페이지네이션 -->
  <div class="pagination" id="pagination"></div>
</div>

<footer class="site-footer">
  &copy; 2026 COALAB AI뉴스 &middot; <a href="index.html">홈으로</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL = 'https://onfddgmyzkeaxidpdwra.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uZmRkZ215emtlYXhpZHBkd3JhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI2NzgwMDcsImV4cCI6MjA3ODI1NDAwN30.pwzxOD_6TEQT-KWZzvvlIXCnR6qr_9kN6jFf57FtAwo';
  const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
</script>
<script>
  const PAGE_SIZE = 10;
  let currentPage = 1;
  let totalCount = 0;

  async function loadArticles() {
    const listEl = document.getElementById('article-list');
    const searchQuery = document.getElementById('search-input').value.trim();
    const category = document.getElementById('category-filter').value;

    listEl.innerHTML = '<div class="loading">기사를 불러오는 중</div>';

    const from = (currentPage - 1) * PAGE_SIZE;
    const to = from + PAGE_SIZE - 1;

    let query = _supabase
      .from('articles')
      .select('id, title, summary, author, category, thumbnail_url, view_count, created_at, published', { count: 'exact' })
      .eq('published', true)
      .order('created_at', { ascending: false })
      .range(from, to);

    if (searchQuery) {
      query = query.ilike('title', `%${searchQuery}%`);
    }
    if (category) {
      query = query.eq('category', category);
    }

    const { data, error, count } = await query;

    if (error) {
      listEl.innerHTML = '<div class="alert alert-error">기사를 불러오는 데 실패했습니다: ' + error.message + '</div>';
      return;
    }

    totalCount = count || 0;

    if (!data || data.length === 0) {
      listEl.innerHTML = '<div class="empty-state"><div class="emoji">📭</div><p>등록된 기사가 없습니다.</p></div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    let html = `
      <table class="board-table">
        <thead>
          <tr>
            <th style="width:50%">제목</th>
            <th>카테고리</th>
            <th>작성자</th>
            <th>작성일</th>
            <th>조회</th>
          </tr>
        </thead>
        <tbody>
    `;

    data.forEach(article => {
      const date = new Date(article.created_at).toLocaleDateString('ko-KR');
      html += `
        <tr>
          <td class="title-cell">
            <a href="article.html?id=${article.id}">${escapeHtml(article.title)}</a>
          </td>
          <td><span class="category-badge">${escapeHtml(article.category || '일반')}</span></td>
          <td>${escapeHtml(article.author || '관리자')}</td>
          <td>${date}</td>
          <td>${article.view_count || 0}</td>
        </tr>
      `;
    });

    html += '</tbody></table>';
    listEl.innerHTML = html;

    renderPagination();
  }

  function renderPagination() {
    const totalPages = Math.ceil(totalCount / PAGE_SIZE);
    const paginationEl = document.getElementById('pagination');

    if (totalPages <= 1) {
      paginationEl.innerHTML = '';
      return;
    }

    let html = '';
    html += `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">&laquo; 이전</button>`;

    const startPage = Math.max(1, currentPage - 2);
    const endPage = Math.min(totalPages, currentPage + 2);

    if (startPage > 1) {
      html += `<button onclick="goToPage(1)">1</button>`;
      if (startPage > 2) html += `<button disabled>...</button>`;
    }

    for (let i = startPage; i <= endPage; i++) {
      html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
    }

    if (endPage < totalPages) {
      if (endPage < totalPages - 1) html += `<button disabled>...</button>`;
      html += `<button onclick="goToPage(${totalPages})">${totalPages}</button>`;
    }

    html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">다음 &raquo;</button>`;

    paginationEl.innerHTML = html;
  }

  function goToPage(page) {
    currentPage = page;
    loadArticles();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  document.getElementById('search-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      currentPage = 1;
      loadArticles();
    }
  });

  loadArticles();
</script>

</body>
</html>
